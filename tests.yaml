# ualib Test Cases
# Language-agnostic test cases for user-agent parsing
# Each test specifies input and expected output for all functions

# Format:
# - description: Human-readable test description
#   input: The user-agent string to parse
#   parse:  Expected output from parse() function
#   is_mobile: Expected boolean from is_mobile()
#   is_tablet: Expected boolean from is_tablet()
#   is_pc: Expected boolean from is_pc()
#   is_bot: Expected boolean from is_bot()

# Note: is_mobile/is_tablet/is_pc/is_bot values are always consistent with
# parse.device.type per the SPEC.md invariant.

# Version Note: Version numbers should match exactly as specified in these tests.
# These test values are the canonical expected output. Do NOT modify this file
# to match your parser's output — instead, adjust your implementation to match
# these expected values. The goal is consistency across implementations.

tests:
  # ============================================================================
  # Desktop Browsers - Windows
  # ============================================================================

  - description: "Chrome on Windows 10"
    input: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    parse:
      browser: { name: "Chrome", version: "120.0.0.0", major: "120" }
      os: { name: "Windows", version: "10" }
      device: { type: "desktop", model: null, vendor: null }
      engine: { name: "Blink", version: "120.0.0.0" }
      cpu: { architecture: "amd64" }
    is_mobile: false
    is_tablet: false
    is_pc: true
    is_bot: false

  - description: "Firefox on Windows (NT 10.0, may be Windows 10 or 11)"
    input: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0"
